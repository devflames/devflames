name: Update GitHub Streak

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: zients/github-readme-streak-stats@v2
        with:
          options: user=devflames&theme=tokyonight&hide_border=true&disable_animations=true
          path: assets/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated streak
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg
          if git diff --cached --quiet; then
            echo "No streak changes to commit."
            exit 0
          fi
          git commit -m "Update GitHub streak stats [skip ci]"
          git push
